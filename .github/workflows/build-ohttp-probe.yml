# Builds the ohttp-probe image from ohttp-probe/ and pushes it to ghcr.io
name: Build OHTTP Probe Image

on:
  push:
    branches:
      - main
    paths:
      - "ohttp-probe/**"
      - ".github/workflows/build-ohttp-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}/ohttp-probe
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ./ohttp-probe
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: "type=gha,mode=max"
          platforms: linux/amd64

      - name: Attest
        uses: actions/attest-build-provenance@v1
        with:
          push-to-registry: true
          subject-name: ghcr.io/${{ github.repository }}/ohttp-probe
          subject-digest: ${{ steps.docker_build.outputs.digest }}
